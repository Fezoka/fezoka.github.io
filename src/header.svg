<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 320" width="100%" height="100%">
  <defs>
    <!-- Fundo Gradiente Cyber Green -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030a06" />
      <stop offset="50%" stop-color="#071a10" />
      <stop offset="100%" stop-color="#020604" />
    </linearGradient>

    <!-- Gradiente para o Planeta e Rede -->
    <linearGradient id="globe-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#059669" stop-opacity="0.2" />
    </linearGradient>
    
    <radialGradient id="globe-core" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.4" />
      <stop offset="70%" stop-color="#047857" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#022c22" stop-opacity="0" />
    </radialGradient>

    <!-- Efeitos de Brilho Neon Verde -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Máscara de Corte para o Letreiro Inferior -->
    <clipPath id="marquee-clip">
      <rect x="40" y="240" width="510" height="36" rx="4" />
    </clipPath>

    <!-- Máscara para Efeito de Digitação no Terminal -->
    <clipPath id="typing-clip">
      <rect x="175" y="20" width="0" height="30">
        <animate attributeName="width" values="0;75;75;0" keyTimes="0;0.35;0.85;1" dur="5s" repeatCount="indefinite" />
      </rect>
    </clipPath>
    
    <!-- Máscara para manter continentes dentro do globo -->
    <clipPath id="globe-clip">
      <circle cx="700" cy="160" r="60" />
    </clipPath>
  </defs>

  <!-- Fundo com Granulado -->
  <rect width="850" height="320" fill="url(#bg)" />
  
  <!-- Constelações / Estrelas em Tons de Verde -->
  <g stroke="#047857" stroke-width="1" opacity="0.4">
    <polyline points="420,40 460,70 510,55 540,90" fill="none" />
    <circle cx="420" cy="40" r="2" fill="#10b981" />
    <circle cx="460" cy="70" r="2" fill="#10b981" />
    <circle cx="510" cy="55" r="2" fill="#10b981" />
    <circle cx="540" cy="90" r="2" fill="#10b981" />
    <polyline points="770,30 800,65 785,105" fill="none" />
    <circle cx="770" cy="30" r="2" fill="#10b981" />
    <circle cx="800" cy="65" r="2" fill="#10b981" />
    <circle cx="785" cy="105" r="2" fill="#10b981" />
  </g>

  <!-- Terminal Superior Esquerdo (Com Efeito de Digitação Realista) -->
  <rect x="40" y="25" width="250" height="30" rx="6" fill="#03180f" stroke="#059669" stroke-width="1.5" />
  <circle cx="55" cy="40" r="4.5" fill="#22c55e" filter="url(#glow-sm)" />
  
  <!-- Prompt Fixo -->
  <text x="70" y="44" font-family="Consolas, monospace" font-size="12" fill="#10b981">root@fezoka:~# </text>
  
  <!-- Texto "Hello word" sendo digitado -->
  <g clip-path="url(#typing-clip)">
    <text x="175" y="44" font-family="Consolas, monospace" font-size="12" fill="#a7f3d0">Hello word</text>
  </g>

  <!-- Cursor do Terminal que acompanha a digitação e pisca -->
  <rect x="175" y="33" width="6" height="14" fill="#22c55e">
    <animate attributeName="x" values="175;248;248;175" keyTimes="0;0.35;0.85;1" dur="5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite" />
  </rect>

  <!-- Nome Principal e Cursor Piscante -->
  <text x="40" y="115" font-family="'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="42" fill="#f0fdf4" filter="url(#glow)">Felipe Soares</text>
  <text x="315" y="112" font-family="Consolas, monospace" font-size="40" fill="#22c55e" filter="url(#glow-sm)">|
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
  </text>

  <!-- Subtítulos -->
  <text x="40" y="160" font-family="'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="18" fill="#4ade80">Cursando Bacharel em Ciência da Computação</text>
  <text x="40" y="195" font-family="'Segoe UI', Roboto, sans-serif" font-size="15" fill="#6ee7b7">Buscando estágio</text>

  <!-- Caixa do Letreiro (Marquee) na parte inferior com Rolagem Corrigida -->
  <rect x="40" y="240" width="510" height="36" rx="4" fill="#020f08" stroke="#047857" stroke-width="1" />
  <g clip-path="url(#marquee-clip)">
    <text y="263" font-family="Consolas, monospace" font-size="13" fill="#34d399">
      ❖ Experiência prática com SaaS ❖ Automação de Workflows ❖ Experiência prática com SaaS ❖ Automação de Workflows ❖
      <!-- Animação de rolagem contínua (Ajustada para não cortar palavras) -->
      <animate attributeName="x" from="40" to="-440" dur="14s" repeatCount="indefinite" />
    </text>
  </g>

  <!-- Linha Divisória Vertical -->
  <line x1="580" y1="30" x2="580" y2="290" stroke="#064e3b" stroke-width="1" stroke-dasharray="4 4" />

  <!-- Lado Direito: Radar Verde -->
  <g transform="translate(700, 160)">
    <!-- Anéis do Radar -->
    <circle cx="0" cy="0" r="105" fill="none" stroke="#064e3b" stroke-width="1.5" />
    <circle cx="0" cy="0" r="85" fill="none" stroke="#047857" stroke-width="1" />
    
    <!-- Ponto Brilhante girando no Anel do Radar -->
    <circle cx="0" cy="-105" r="4" fill="#a7f3d0" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- ================= PLANETA CONECTADO EM SVG (ESTILO REDE TECH) ================= -->
  <g transform="translate(700, 160)">
    <!-- Brilho ao redor e fundo do globo -->
    <circle cx="0" cy="0" r="62" fill="url(#globe-core)" filter="url(#glow)" />
    <circle cx="0" cy="0" r="60" fill="none" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.6" filter="url(#glow-sm)" />
    
    <!-- Linhas de Latitude e Longitude (Globo 3D Wireframe) -->
    <ellipse cx="0" cy="0" rx="60" ry="20" fill="none" stroke="#059669" stroke-width="1" stroke-dasharray="3 3" opacity="0.5" />
    <ellipse cx="0" cy="0" rx="60" ry="45" fill="none" stroke="#059669" stroke-width="1" opacity="0.4" />
    <ellipse cx="0" cy="0" rx="30" ry="60" fill="none" stroke="#059669" stroke-width="1" opacity="0.4" />
    <line x1="-60" y1="0" x2="60" y2="0" stroke="#059669" stroke-width="1" opacity="0.4" />
    <line x1="0" y1="-60" x2="0" y2="60" stroke="#059669" stroke-width="1" opacity="0.4" />

    <!-- Continentes Pontilhados (Estilo Matrix/Tech) -->
    <g clip-path="url(#globe-clip)" fill="#34d399" opacity="0.75">
      <!-- América do Sul / Norte (Simulado) -->
      <path d="M-40,-20 Q-30,-30 -10,-15 T-25,10 T-15,35 T-30,45 T-45,20 Z" />
      <!-- Europa / África (Simulado) -->
      <path d="M10,-35 Q25,-40 40,-25 T35,5 T20,30 T5,10 Z" />
    </g>

    <!-- Rede de Conexões Geodésicas (Nós e Linhas) -->
    <g stroke="#6ee7b7" stroke-width="1.2" opacity="0.85">
      <!-- Conexões Externas -->
      <line x1="-45" y1="-35" x2="-20" y2="-50" />
      <line x1="-20" y1="-50" x2="15" y2="-45" />
      <line x1="15" y1="-45" x2="45" y2="-25" />
      <line x1="45" y1="-25" x2="55" y2="10" />
      <line x1="55" y1="10" x2="35" y2="45" />
      <line x1="35" y1="45" x2="0" y2="55" />
      <line x1="0" y1="55" x2="-35" y2="40" />
      <line x1="-35" y1="40" x2="-55" y2="10" />
      <line x1="-55" y1="10" x2="-45" y2="-35" />

      <!-- Conexões Internas -->
      <line x1="-45" y1="-35" x2="-10" y2="-10" />
      <line x1="-20" y1="-50" x2="20" y2="-15" />
      <line x1="15" y1="-45" x2="-10" y2="-10" />
      <line x1="45" y1="-25" x2="20" y2="15" />
      <line x1="55" y1="10" x2="10" y2="35" />
      <line x1="0" y1="55" x2="-20" y2="15" />
      <line x1="-35" y1="40" x2="-10" y2="-10" />
      <line x1="-55" y1="10" x2="-20" y2="15" />
      <line x1="-10" y1="-10" x2="20" y2="15" />
    </g>

    <!-- Nós de Dados (Pontos Brilhantes da Rede) -->
    <g fill="#a7f3d0" filter="url(#glow-sm)">
      <circle cx="-45" cy="-35" r="3" />
      <circle cx="-20" cy="-50" r="3.5" />
      <circle cx="15" cy="-45" r="3" />
      <circle cx="45" cy="-25" r="3" />
      <circle cx="55" cy="10" r="3.5" />
      <circle cx="35" cy="45" r="3" />
      <circle cx="0" cy="55" r="3.5" />
      <circle cx="-35" cy="40" r="3" />
      <circle cx="-55" cy="10" r="3" />
      <!-- Nós Centrais -->
      <circle cx="-10" cy="-10" r="4" fill="#ffffff" />
      <circle cx="20" cy="15" r="3.5" />
      <circle cx="-20" cy="15" r="3" />
      <circle cx="20" cy="-15" r="3" />
    </g>

    <!-- Anel Externo Giratório Tech -->
    <circle cx="0" cy="0" r="68" fill="none" stroke="#10b981" stroke-width="1" stroke-dasharray="10 20 5 15" opacity="0.7">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="20s" repeatCount="indefinite" />
    </circle>
  </g>
  <!-- ================= END PLANETA ================= -->

  <!-- Badge Online (SOBREPOSIÇÃO GARANTIDA NA FRENTE DO PLANETA) -->
  <g transform="translate(670, 200)" filter="url(#glow)">
    <rect x="0" y="0" width="90" height="26" rx="13" fill="#022c22" stroke="#059669" stroke-width="1.5" />
    <circle cx="16" cy="13" r="4" fill="#22c55e">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" />
    </circle>
    <text x="30" y="17" font-family="Consolas, monospace" font-weight="bold" font-size="11" fill="#34d399">ONLINE</text>
  </g>
</svg>
